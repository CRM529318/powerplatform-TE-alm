name: Power Platform Release (Enterprise Ready)

on:
  workflow_dispatch:
    inputs:
      solutions:
        description: "Solutions (comma separated: core,process,ux)"
        required: true

jobs:

# 🔹 BUILD (EXPORT + ARTIFACT)
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    # ✅ FIX NODE ISSUE
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    # ✅ Install PAC CLI (STABLE)
    - name: Install PAC CLI
      run: |
        dotnet tool install --global Microsoft.PowerApps.CLI.Tool
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Verify PAC
      run: pac version

    # 🔐 AUTH DEV
    - name: Authenticate DEV
      run: |
        pac auth create \
          --url ${{ secrets.DEV_URL }} \
          --applicationId ${{ secrets.CLIENT_ID }} \
          --clientSecret ${{ secrets.CLIENT_SECRET }} \
          --tenant ${{ secrets.TENANT_ID }}

    # 📦 EXPORT SOLUTIONS
    - name: Export Solutions
      run: |
        for sol in $(echo "${{ inputs.solutions }}" | tr ',' ' '); do
          echo "Exporting $sol"
          pac solution export \
            --name $sol \
            --path $sol.zip \
            --managed
        done

    # 📦 UPLOAD ARTIFACT
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: powerplatform-release
        path: "*.zip"

# 🔹 TEST DEPLOY
  deploy-test:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: powerplatform-release

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install PAC CLI
      run: |
        dotnet tool install --global Microsoft.PowerApps.CLI.Tool
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    # 🔐 AUTH TEST
    - name: Authenticate TEST
      run: |
        pac auth create \
          --url ${{ secrets.TEST_URL }} \
          --applicationId ${{ secrets.CLIENT_ID }} \
          --clientSecret ${{ secrets.CLIENT_SECRET }} \
          --tenant ${{ secrets.TENANT_ID }}

    # 🚀 DEPLOY IN ORDER
    - name: Deploy to TEST
      run: |
        for sol in core process ux; do
          if [ -f "$sol.zip" ]; then
            echo "Deploying $sol to TEST"
            pac solution import \
              --path $sol.zip \
              --publish-changes \
              --activate-plugins
          fi
        done

# 🔹 UAT DEPLOY
  deploy-uat:
    needs: deploy-test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: powerplatform-release

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install PAC CLI
      run: |
        dotnet tool install --global Microsoft.PowerApps.CLI.Tool
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    # 🔐 AUTH UAT
    - name: Authenticate UAT
      run: |
        pac auth create \
          --url ${{ secrets.UAT_URL }} \
          --applicationId ${{ secrets.CLIENT_ID }} \
          --clientSecret ${{ secrets.CLIENT_SECRET }} \
          --tenant ${{ secrets.TENANT_ID }}

    - name: Deploy to UAT
      run: |
        for sol in core process ux; do
          if [ -f "$sol.zip" ]; then
            echo "Deploying $sol to UAT"
            pac solution import \
              --path $sol.zip \
              --publish-changes \
              --activate-plugins
          fi
        done

# 🔹 PROD DEPLOY
  deploy-prod:
    needs: deploy-uat
    runs-on: ubuntu-latest

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: powerplatform-release

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install PAC CLI
      run: |
        dotnet tool install --global Microsoft.PowerApps.CLI.Tool
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    # 🔐 AUTH PROD
    - name: Authenticate PROD
      run: |
        pac auth create \
          --url ${{ secrets.PROD_URL }} \
          --applicationId ${{ secrets.CLIENT_ID }} \
          --clientSecret ${{ secrets.CLIENT_SECRET }} \
          --tenant ${{ secrets.TENANT_ID }}

    - name: Deploy to PROD
      run: |
        for sol in core process ux; do
          if [ -f "$sol.zip" ]; then
            echo "Deploying $sol to PROD"
            pac solution import \
              --path $sol.zip \
              --publish-changes \
              --activate-plugins
          fi
        done

    - name: Apply Upgrade
      run: |
        for sol in core process ux; do
          pac solution upgrade --name $sol || true
        done
