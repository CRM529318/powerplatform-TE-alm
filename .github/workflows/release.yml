name: Power Platform Release (Stable)

on:
  workflow_dispatch:
    inputs:
      solutions:
        description: "Solution names (example: core or core,process)"
        required: true

jobs:

# ================= BUILD =================
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    # ✅ Use .NET (NO NODE NEEDED)
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # ✅ Install PAC CLI (STABLE WAY)
    - name: Install PAC CLI
      run: |
        dotnet tool install --global Microsoft.PowerApps.CLI.Tool
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    # ✅ Verify
    - name: Verify PAC
      run: pac version

    # 🔐 AUTH DEV
    - name: Authenticate DEV
      run: |
        pac auth create \
          --url "${{ secrets.DEV_URL }}" \
          --applicationId "${{ secrets.CLIENT_ID }}" \
          --clientSecret "${{ secrets.CLIENT_SECRET }}" \
          --tenant "${{ secrets.TENANT_ID }}"

    # 📦 EXPORT
    - name: Export Solutions
      run: |
        for sol in $(echo "${{ inputs.solutions }}" | tr ',' ' '); do
          echo "Exporting $sol"
          pac solution export \
            --name "$sol" \
            --path "$sol.zip" \
            --managed
        done

    # 📦 ARTIFACT
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: powerplatform-release
        path: "*.zip"

# ================= TEST =================
  deploy-test:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: powerplatform-release

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install PAC CLI
      run: |
        dotnet tool install --global Microsoft.PowerApps.CLI.Tool
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Authenticate TEST
      run: |
        pac auth create \
          --url "${{ secrets.TEST_URL }}" \
          --applicationId "${{ secrets.CLIENT_ID }}" \
          --clientSecret "${{ secrets.CLIENT_SECRET }}" \
          --tenant "${{ secrets.TENANT_ID }}"

    - name: Deploy to TEST
      run: |
        for sol in core process ux; do
          if [ -f "$sol.zip" ]; then
            echo "Deploying $sol to TEST"
            pac solution import \
              --path "$sol.zip" \
              --publish-changes \
              --activate-plugins
          fi
        done

# ================= UAT =================
  deploy-uat:
    needs: deploy-test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: powerplatform-release

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install PAC CLI
      run: |
        dotnet tool install --global Microsoft.PowerApps.CLI.Tool
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Authenticate UAT
      run: |
        pac auth create \
          --url "${{ secrets.UAT_URL }}" \
          --applicationId "${{ secrets.CLIENT_ID }}" \
          --clientSecret "${{ secrets.CLIENT_SECRET }}" \
          --tenant "${{ secrets.TENANT_ID }}"

    - name: Deploy to UAT
      run: |
        for sol in core process ux; do
          if [ -f "$sol.zip" ]; then
            echo "Deploying $sol to UAT"
            pac solution import \
              --path "$sol.zip" \
              --publish-changes \
              --activate-plugins
          fi
        done

# ================= PROD =================
  deploy-prod:
    needs: deploy-uat
    runs-on: ubuntu-latest

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: powerplatform-release

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install PAC CLI
      run: |
        dotnet tool install --global Microsoft.PowerApps.CLI.Tool
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Authenticate PROD
      run: |
        pac auth create \
          --url "${{ secrets.PROD_URL }}" \
          --applicationId "${{ secrets.CLIENT_ID }}" \
          --clientSecret "${{ secrets.CLIENT_SECRET }}" \
          --tenant "${{ secrets.TENANT_ID }}"

    - name: Deploy to PROD
      run: |
        for sol in core process ux; do
          if [ -f "$sol.zip" ]; then
            echo "Deploying $sol to PROD"
            pac solution import \
              --path "$sol.zip" \
              --publish-changes \
              --activate-plugins
          fi
        done

    - name: Apply Upgrade
      run: |
        for sol in core process ux; do
          pac solution upgrade --name "$sol" || true
        done
