name: Power Platform Release (FINAL)

on:
  workflow_dispatch:
    inputs:
      solutions:
        description: "Solution names (example: core)"
        required: true

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install PAC CLI
      run: |
        dotnet tool install --global Microsoft.PowerApps.CLI.Tool
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    # ✅ FIXED
    - name: Verify PAC
      run: pac help

    - name: Authenticate DEV
      run: |
        pac auth create \
          --url "${{ secrets.DEV_URL }}" \
          --applicationId "${{ secrets.CLIENT_ID }}" \
          --clientSecret "${{ secrets.CLIENT_SECRET }}" \
          --tenant "${{ secrets.TENANT_ID }}"

    - name: Export Solution
      run: |
        pac solution export \
          --name "${{ inputs.solutions }}" \
          --path solution.zip \
          --managed

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.solutions }}-${{ github.run_number }}
        path: solution.zip


  deploy-test:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: solution-artifact

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install PAC CLI
      run: |
        dotnet tool install --global Microsoft.PowerApps.CLI.Tool
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Authenticate TEST
      run: |
        pac auth create \
          --url "${{ secrets.TEST_URL }}" \
          --applicationId "${{ secrets.CLIENT_ID }}" \
          --clientSecret "${{ secrets.CLIENT_SECRET }}" \
          --tenant "${{ secrets.TENANT_ID }}"

    - name: Import to TEST
      run: |
        pac solution import \
          --path solution.zip \
          --publish-changes \
          --activate-plugins


  deploy-uat:
    needs: deploy-test
    runs-on: ubuntu-latest
    environment: uat

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: solution-artifact

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install PAC CLI
      run: |
        dotnet tool install --global Microsoft.PowerApps.CLI.Tool
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Authenticate UAT
      run: |
        pac auth create \
          --url "${{ secrets.UAT_URL }}" \
          --applicationId "${{ secrets.CLIENT_ID }}" \
          --clientSecret "${{ secrets.CLIENT_SECRET }}" \
          --tenant "${{ secrets.TENANT_ID }}"

    - name: Import to UAT
      run: |
        pac solution import \
          --path solution.zip \
          --publish-changes \
          --activate-plugins


  deploy-prod:
    needs: deploy-uat
    runs-on: ubuntu-latest
    environment: prod

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: solution-artifact
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install PAC CLI
      run: |
        dotnet tool install --global Microsoft.PowerApps.CLI.Tool
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Authenticate PROD
      run: |
        pac auth create \
          --url "${{ secrets.PROD_URL }}" \
          --applicationId "${{ secrets.CLIENT_ID }}" \
          --clientSecret "${{ secrets.CLIENT_SECRET }}" \
          --tenant "${{ secrets.TENANT_ID }}"

    - name: Import to PROD
      run: |
        pac solution import \
          --path solution.zip \
          --publish-changes \
          --activate-plugins

    - name: Upgrade Solution
      run: |
        pac solution upgrade --name "${{ inputs.solutions }}" || true
