name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      solution:
        description: "Solution name (core)"
        required: true
      version:
        description: "Version (example: v1.0.15)"
        required: true

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: prod

    steps:
    - name: Download from Release
      run: |
        curl -L \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -o solution.zip \
          https://github.com/${{ github.repository }}/releases/download/${{ inputs.version }}/${{ inputs.solution }}-${{ inputs.version }}.zip

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install PAC CLI
      run: |
        dotnet tool install --global Microsoft.PowerApps.CLI.Tool
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Authenticate PROD
      run: |
        pac auth create \
          --url "${{ secrets.PROD_URL }}" \
          --applicationId "${{ secrets.CLIENT_ID }}" \
          --clientSecret "${{ secrets.CLIENT_SECRET }}" \
          --tenant "${{ secrets.TENANT_ID }}"

    - name: Rollback Deployment
      run: |
        pac solution import \
          --path solution.zip \
          --publish-changes \
          --activate-plugins
