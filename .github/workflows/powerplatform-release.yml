name: Power Platform Release

on:
  workflow_dispatch:
    inputs:
      releaseTag:
        description: "GitHub Release tag to deploy (example: build-23)"
        required: true

jobs:

  deploy-test:
    runs-on: ubuntu-latest
    environment: test

    steps:
    - name: Download artifact from GitHub Release
      uses: robinraju/release-downloader@v1
      with:
        tag: ${{ inputs.releaseTag }}
        fileName: solution.zip

    - name: Install PAC CLI
      run: |
        dotnet tool install --global Microsoft.PowerApps.CLI.Tool
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Authenticate TEST
      run: |
        pac auth create \
        --url "${{ secrets.TEST_URL }}" \
        --applicationId "${{ secrets.CLIENT_ID }}" \
        --clientSecret "${{ secrets.CLIENT_SECRET }}" \
        --tenant "${{ secrets.TENANT_ID }}"

    - name: Import to TEST
      run: |
        pac solution import --path solution.zip --publish-changes --activate-plugins

  deploy-uat:
    needs: deploy-test
    runs-on: ubuntu-latest
    environment: uat

    steps:
    - uses: robinraju/release-downloader@v1
      with:
        tag: ${{ inputs.releaseTag }}
        fileName: solution.zip

    - name: Authenticate UAT
      run: |
        pac auth create \
        --url "${{ secrets.UAT_URL }}" \
        --applicationId "${{ secrets.CLIENT_ID }}" \
        --clientSecret "${{ secrets.CLIENT_SECRET }}" \
        --tenant "${{ secrets.TENANT_ID }}"

    - name: Import to UAT
      run: |
        pac solution import --path solution.zip --publish-changes --activate-plugins

  deploy-prod:
    needs: deploy-uat
    runs-on: ubuntu-latest
    environment: prod

    steps:
    - uses: robinraju/release-downloader@v1
      with:
        tag: ${{ inputs.releaseTag }}
        fileName: solution.zip

    - name: Authenticate PROD
      run: |
        pac auth create \
        --url "${{ secrets.PROD_URL }}" \
        --applicationId "${{ secrets.CLIENT_ID }}" \
        --clientSecret "${{ secrets.CLIENT_SECRET }}" \
        --tenant "${{ secrets.TENANT_ID }}"

    - name: Import to PROD
      run: |
        pac solution import --path solution.zip --publish-changes --activate-plugins

    - name: Upgrade Solution
      run: pac solution upgrade || true
