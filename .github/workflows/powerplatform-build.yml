name: Power Platform Build

permissions:
  contents: write
  security-events: write

on:
  workflow_dispatch:
    inputs:
      solutionName:
        description: "Solution unique name (example: core)"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install PAC CLI
      run: |
        dotnet tool install --global Microsoft.PowerApps.CLI.Tool
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Verify PAC
      run: pac solution check --help

    - name: Authenticate DEV
      run: |
        pac auth create \
          --url "${{ secrets.DEV_URL }}" \
          --applicationId "${{ secrets.CLIENT_ID }}" \
          --clientSecret "${{ secrets.CLIENT_SECRET }}" \
          --tenant "${{ secrets.TENANT_ID }}"

    # ✅ Export managed solution (Apps + Flows)
    - name: Export Managed Solution
      run: |
        pac solution export \
          --name "${{ inputs.solutionName }}" \
          --path solution.zip \
          --managed

    # ✅ PAC CLI v2 compatible Solution Checker
    - name: Run Solution Checker
      run: |
        pac solution check \
          --path solution.zip \
          --outputDirectory checker-results \
          --ruleSet SolutionChecker \
          --saveResults

    # ✅ Publish SARIF to GitHub Security (auto-detected)
    - name: Publish Solution Checker Results to GitHub
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: checker-results

    # ✅ AUTOMATED REVIEW (policy enforcement)
    - name: Evaluate Solution Checker Results
      run: |
        SUMMARY_FILE=$(find checker-results -iname "*summary*.json" | head -n 1)

        if [ -z "$SUMMARY_FILE" ]; then
          echo "❌ Solution Checker summary not found"
          exit 1
        fi

        HIGH=$(jq '[.issues[] | select(.severity=="High")] | length' "$SUMMARY_FILE")
        CRITICAL=$(jq '[.issues[] | select(.severity=="Critical")] | length' "$SUMMARY_FILE")

        echo "High issues: $HIGH"
        echo "Critical issues: $CRITICAL"

        if [ "$HIGH" -gt 0 ] || [ "$CRITICAL" -gt 0 ]; then
          echo "❌ Solution Checker policy violated"
          exit 1
        fi

    - name: Upload Solution Artifact
      uses: actions/upload-artifact@v4
      with:
        name: solution-${{ inputs.solutionName }}-${{ github.run_number }}
        path: |
          solution.zip
          checker-results

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: Power Platform Build ${{ github.run_number }}
        files: solution.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
