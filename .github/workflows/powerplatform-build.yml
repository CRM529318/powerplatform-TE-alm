name: Power Platform Build

permissions:
  contents: write
  security-events: write   # ✅ REQUIRED for SARIF upload

on:
  workflow_dispatch:
    inputs:
      solutionName:
        description: "Solution unique name (example: core)"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install PAC CLI
      run: |
        dotnet tool install --global Microsoft.PowerApps.CLI.Tool
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Verify PAC
      run: pac help

    - name: Authenticate DEV
      run: |
        pac auth create \
          --url "${{ secrets.DEV_URL }}" \
          --applicationId "${{ secrets.CLIENT_ID }}" \
          --clientSecret "${{ secrets.CLIENT_SECRET }}" \
          --tenant "${{ secrets.TENANT_ID }}"

    # ✅ Export managed solution (includes Apps + Flows)
    - name: Export Managed Solution
      run: |
        pac solution export \
          --name "${{ inputs.solutionName }}" \
          --path solution.zip \
          --managed

    # ✅ Run Solution Checker (explicit SARIF output)
    - name: Run Solution Checker
      run: |
        pac solution check \
          --path solution.zip \
          --outputDirectory checker-results \
          --ruleSetId 0ad12346-e108-40b8-a956-9a8f95ea18c9 \
          --outputFormat sarif

    # ✅ Upload SARIF to GitHub Security tab (THIS IS "REVIEW")
    - name: Publish Solution Checker to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: checker-results

    # ✅ AUTOMATIC REVIEW: Parse results and enforce policy
    - name: Evaluate Solution Checker Results
      run: |
        SUMMARY_FILE=$(find checker-results -name "*summary*.json" | head -n 1)

        if [ -z "$SUMMARY_FILE" ]; then
          echo "❌ Solution Checker summary not found"
          exit 1
        fi

        HIGH=$(jq '[.issues[] | select(.severity=="High")] | length' $SUMMARY_FILE)
        CRITICAL=$(jq '[.issues[] | select(.severity=="Critical")] | length' $SUMMARY_FILE)

        echo "High issues: $HIGH"
        echo "Critical issues: $CRITICAL"

        if [ "$HIGH" -gt 0 ] || [ "$CRITICAL" -gt 0 ]; then
          echo "❌ Solution Checker policy violated"
          exit 1
        fi

    - name: Upload Solution Artifact
      uses: actions/upload-artifact@v4
      with:
        name: solution-${{ inputs.solutionName }}-${{ github.run_number }}
        path: |
          solution.zip
          checker-results

    # ✅ Create release for promotion
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: Power Platform Build ${{ github.run_number }}
        files: solution.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
