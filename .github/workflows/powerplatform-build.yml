name: Power Platform Build

# ✅ REQUIRED for GitHub Release creation
permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      solutionName:
        description: "Solution unique name (example: core)"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install PAC CLI
      run: |
        dotnet tool install --global Microsoft.PowerApps.CLI.Tool
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Verify PAC
      run: pac help

    - name: Authenticate DEV
      run: |
        pac auth create \
        --url "${{ secrets.DEV_URL }}" \
        --applicationId "${{ secrets.CLIENT_ID }}" \
        --clientSecret "${{ secrets.CLIENT_SECRET }}" \
        --tenant "${{ secrets.TENANT_ID }}"

    - name: Export Managed Solution
      run: |
        pac solution export --name "${{ inputs.solutionName }}" --path solution.zip --managed

    - name: Run Solution Checker
      run: |
        pac solution check --path solution.zip --outputDirectory checker-results
     # My change    
    - name: Fail on Checker Issues
      run: |
        if [ -s "./checker-results/results.sarif" ]; then
          echo "Issues found by Power Apps Checker"
          exit 1
        fi


    - name: Upload Solution Artifact
      uses: actions/upload-artifact@v4
      with:
        name: solution-${{ inputs.solutionName }}-${{ github.run_number }}
        path: |
          solution.zip
          checker-results

    # ✅ THIS NOW WORKS (403 fixed)
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: Power Platform Build ${{ github.run_number }}
        files: solution.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
